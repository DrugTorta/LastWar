<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LastWar — Админ панель</title>
<style>
  :root {
    --bg: #0a0a0f; --card: #111118; --border: #1e1e2e;
    --accent: #7c3aed; --text: #e2e8f0; --muted: #64748b;
    --green: #22c55e; --red: #ef4444; --yellow: #eab308;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .login-box {
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    padding: 48px 40px; width: 360px; text-align: center;
  }
  .login-box h2 { font-size: 24px; margin-bottom: 8px; }
  .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 14px; outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: var(--accent); }
  button {
    background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; border: none;
    padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity .2s; width: 100%;
  }
  button:hover { opacity: .85; }
  button.danger { background: var(--red); }
  button.secondary { background: var(--border); color: var(--text); }
  button.small { padding: 6px 14px; font-size: 12px; width: auto; border-radius: 6px; }

  /* DASHBOARD */
  #dashboard { display: none; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px; border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.95);
  }
  .logo { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #7c3aed, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-right span { color: var(--muted); font-size: 13px; }

  main { padding: 32px; max-width: 1400px; margin: 0 auto; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; }
  .stat-card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .stat-card .value { font-size: 32px; font-weight: 800; }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.red { color: var(--red); }
  .stat-card .value.yellow { color: var(--yellow); }

  /* GENERATE */
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 24px; }
  .panel h3 { font-size: 18px; margin-bottom: 20px; }
  .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .form-group input, .form-group select {
    width: auto; min-width: 140px; margin-bottom: 0;
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; border-radius: 8px; font-size: 14px;
  }
  select option { background: var(--bg); }

  /* KEYS TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 14px; color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
  td { padding: 12px 14px; border-bottom: 1px solid rgba(30,30,46,0.5); vertical-align: middle; }
  tr:hover td { background: rgba(124,58,237,0.04); }
  .key-text { font-family: monospace; font-size: 13px; color: #a78bfa; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge.free { background: rgba(100,116,139,0.2); color: #94a3b8; }
  .badge.paid { background: rgba(124,58,237,0.2); color: #a78bfa; }
  .badge.alpha { background: rgba(234,179,8,0.2); color: #fbbf24; }
  .badge.active { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge.revoked { background: rgba(239,68,68,0.15); color: var(--red); }
  .actions { display: flex; gap: 6px; }

  /* GENERATED KEYS */
  .generated-keys { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-top: 16px; font-family: monospace; font-size: 13px; color: #a78bfa; line-height: 1.8; display: none; }

  .search-row { display: flex; gap: 12px; margin-bottom: 16px; }
  .search-row input { flex: 1; margin-bottom: 0; }

  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--green); color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; display: none; z-index: 999; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h2>🔐 Админ панель</h2>
    <p>LastWar License Manager</p>
    <input type="password" id="password-input" placeholder="Пароль" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Войти</button>
    <p id="login-error" style="color:var(--red);font-size:13px;margin-top:12px;display:none">Неверный пароль</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <div class="logo">LastWar Admin</div>
    <div class="header-right">
      <span id="header-time"></span>
      <button class="small secondary" onclick="logout()">Выйти</button>
    </div>
  </header>

  <main>
    <!-- STATS -->
    <div class="stats" id="stats">
      <div class="stat-card"><div class="label">Всего ключей</div><div class="value" id="stat-total">—</div></div>
      <div class="stat-card"><div class="label">Активных</div><div class="value green" id="stat-active">—</div></div>
      <div class="stat-card"><div class="label">Отозванных</div><div class="value red" id="stat-revoked">—</div></div>
      <div class="stat-card"><div class="label">Free</div><div class="value" id="stat-basic">—</div></div>
      <div class="stat-card"><div class="label">Paid</div><div class="value yellow" id="stat-premium">—</div></div>
      <div class="stat-card"><div class="label">Alpha</div><div class="value green" id="stat-lifetime">—</div></div>
    </div>

    <!-- GENERATE -->
    <div class="panel">
      <h3>⚡ Генерация ключей</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Тариф</label>
          <select id="gen-plan">
            <option value="free">Free</option>
            <option value="paid" selected>Paid</option>
            <option value="alpha">Alpha</option>
          </select>
        </div>
        <div class="form-group">
          <label>Дней (0 = ∞)</label>
          <input type="number" id="gen-days" value="30" min="0" style="width:100px">
        </div>
        <div class="form-group">
          <label>Количество</label>
          <input type="number" id="gen-count" value="1" min="1" max="50" style="width:80px">
        </div>
        <div class="form-group">
          <label>Заметка</label>
          <input type="text" id="gen-note" placeholder="Покупатель / причина" style="min-width:200px">
        </div>
        <button class="small" onclick="generateKeys()" style="height:40px">Сгенерировать</button>
      </div>
      <div class="generated-keys" id="generated-output"></div>
    </div>

    <!-- KEYS LIST -->
    <div class="panel">
      <h3>🔑 Ключи</h3>
      <div class="search-row">
        <input type="text" id="search-input" placeholder="Поиск по ключу, тарифу, заметке..." oninput="filterKeys()">
        <button class="small secondary" onclick="loadKeys()">↻ Обновить</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Ключ</th>
              <th>Тариф</th>
              <th>Статус</th>
              <th>HWID</th>
              <th>Создан</th>
              <th>Истекает</th>
              <th>Заметка</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="keys-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
let adminPass = '';
let allKeys = [];

function login() {
  const pass = document.getElementById('password-input').value;
  fetch('/api/admin/keys', { headers: { 'X-Admin-Password': pass } })
    .then(r => {
      if (r.status === 401) {
        document.getElementById('login-error').style.display = 'block';
        return;
      }
      adminPass = pass;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      r.json().then(d => { allKeys = d.keys || []; renderKeys(); updateStats(); });
      setInterval(updateTime, 1000); updateTime();
    });
}

function logout() {
  adminPass = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('password-input').value = '';
}

function updateTime() {
  document.getElementById('header-time').textContent = new Date().toLocaleTimeString('ru');
}

function loadKeys() {
  fetch('/api/admin/keys', { headers: { 'X-Admin-Password': adminPass } })
    .then(r => r.json()).then(d => { allKeys = d.keys || []; filterKeys(); updateStats(); });
}

function updateStats() {
  document.getElementById('stat-total').textContent = allKeys.length;
  document.getElementById('stat-active').textContent = allKeys.filter(k => k.active).length;
  document.getElementById('stat-revoked').textContent = allKeys.filter(k => !k.active).length;
  document.getElementById('stat-basic').textContent = allKeys.filter(k => k.plan === 'free').length;
  document.getElementById('stat-premium').textContent = allKeys.filter(k => k.plan === 'paid').length;
  document.getElementById('stat-lifetime').textContent = allKeys.filter(k => k.plan === 'alpha').length;
}

function filterKeys() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = allKeys.filter(k =>
    k.key.toLowerCase().includes(q) ||
    k.plan.toLowerCase().includes(q) ||
    k.note.toLowerCase().includes(q) ||
    k.hwid.toLowerCase().includes(q)
  );
  renderKeys(filtered);
}

function renderKeys(keys) {
  if (!keys) keys = allKeys;
  const tbody = document.getElementById('keys-tbody');
  tbody.innerHTML = keys.map(k => `
    <tr>
      <td><span class="key-text">${k.key}</span></td>
      <td><span class="badge ${k.plan}">${k.plan}</span></td>
      <td><span class="badge ${k.active ? 'active' : 'revoked'}">${k.active ? 'Активен' : 'Отозван'}</span></td>
      <td style="font-family:monospace;font-size:11px;color:var(--muted)">${k.hwid || '—'}</td>
      <td style="color:var(--muted);font-size:12px">${formatDate(k.created_at)}</td>
      <td style="color:var(--muted);font-size:12px">${k.expires_at ? formatDate(k.expires_at) : '∞'}</td>
      <td style="color:var(--muted);font-size:12px">${k.note || '—'}</td>
      <td>
        <div class="actions">
          <button class="small secondary" onclick="copyKey('${k.key}')">Копировать</button>
          ${k.hwid ? `<button class="small secondary" onclick="resetHWID('${k.key}')">Сброс HWID</button>` : ''}
          ${k.active ? `<button class="small danger" onclick="revokeKey('${k.key}')">Отозвать</button>` : ''}
        </div>
      </td>
    </tr>
  `).join('');
}

function formatDate(s) {
  if (!s) return '—';
  return new Date(s).toLocaleDateString('ru', { day:'2-digit', month:'2-digit', year:'numeric' });
}

function generateKeys() {
  const plan = document.getElementById('gen-plan').value;
  const days = parseInt(document.getElementById('gen-days').value) || 0;
  const count = parseInt(document.getElementById('gen-count').value) || 1;
  const note = document.getElementById('gen-note').value;

  fetch('/api/admin/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPass },
    body: JSON.stringify({ plan, days, count, note })
  }).then(r => r.json()).then(d => {
    const out = document.getElementById('generated-output');
    out.style.display = 'block';
    out.textContent = d.keys.join('\n');
    loadKeys();
    toast('Сгенерировано ' + d.keys.length + ' ключей');
  });
}

function revokeKey(key) {
  if (!confirm('Отозвать ключ ' + key + '?')) return;
  fetch('/api/admin/revoke', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPass },
    body: JSON.stringify({ key })
  }).then(() => { loadKeys(); toast('Ключ отозван'); });
}

function resetHWID(key) {
  fetch('/api/admin/reset-hwid', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPass },
    body: JSON.stringify({ key })
  }).then(() => { loadKeys(); toast('HWID сброшен'); });
}

function copyKey(key) {
  navigator.clipboard.writeText(key);
  toast('Скопировано!');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}
</script>
</body>
</html>
